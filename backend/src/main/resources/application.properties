# src/main/resources/application.properties

# Server
server.port=${PORT:8080}

# Firebase
# Use one of these in production:
# 1. FIREBASE_SERVICE_ACCOUNT_JSON as raw JSON environment variable
# 2. FIREBASE_SERVICE_ACCOUNT_BASE64 for base64 encoded service account
# 3. classpath:firebase-service-account.json for a local file/resource
firebase.serviceAccountJson=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.database-url=${FIREBASE_DATABASE_URL:https://smart-task-tracker-b836b-default-rtdb.firebaseio.com/}
app.firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}

# CORS
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.tasktracker=DEBUG
