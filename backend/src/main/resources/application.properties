# src/main/resources/application.properties

# Server
server.port=${PORT:8080}

# Firebase
# Use one of these in production:
# 1. app.firebase.service-account-json as raw JSON
# 2. app.firebase.service-account-base64 as base64-encoded JSON
# 3. app.firebase.service-account-path for a local file/resource
app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}
app.firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
app.firebase.service-account-base64=${FIREBASE_SERVICE_ACCOUNT_BASE64:}
firebase.database-url=${FIREBASE_DATABASE_URL:https://smart-task-tracker-b836b-default-rtdb.firebaseio.com/}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.tasktracker=DEBUG
